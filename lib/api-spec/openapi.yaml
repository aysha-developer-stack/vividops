openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Vivid OPS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: users
  - name: jobs
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Sign in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Sign out the current session
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Current authenticated user
      responses:
        "200":
          description: Current user or null when signed out
          content:
            application/json:
              schema:
                nullable: true
                allOf:
                  - $ref: "#/components/schemas/User"

  /settings/user:
    get:
      operationId: getUserSettings
      tags: [settings]
      summary: Get current user settings
      responses:
        "200":
          description: User settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"
        "401":
          description: Not signed in
    patch:
      operationId: updateUserSettings
      tags: [settings]
      summary: Update current user settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSettingsUpdate"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"
        "401":
          description: Not signed in

  /settings/system:
    get:
      operationId: getSystemSettings
      tags: [settings]
      summary: Get global system settings
      responses:
        "200":
          description: System settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemSettings"
        "401":
          description: Not signed in
    patch:
      operationId: updateSystemSettings
      tags: [settings]
      summary: Update global system settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemSettingsUpdate"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemSettings"
        "401":
          description: Not signed in
        "403":
          description: Forbidden - Super Admin only

  /settings/system/metrics:
    get:
      operationId: getSystemMetrics
      tags: [settings]
      summary: Get live system metrics
      responses:
        "200":
          description: System metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemMetrics"
        "401":
          description: Not signed in
        "403":
          description: Forbidden - Super Admin only

  /auth/profile:
    patch:
      operationId: updateProfile
      tags: [auth]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Set a new password (used after first sign-in with temp password)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/assignable:
    get:
      operationId: listAssignableUsers
      tags: [users]
      summary: List users that can be assigned to jobs (active users + supervisors)
      responses:
        "200":
          description: Assignable users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AssignableUser"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users (admin / super-admin only)
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateUserResult"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a single user
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Deleted

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List jobs visible to the current user
      responses:
        "200":
          description: Job list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"
    post:
      operationId: createJob
      tags: [jobs]
      summary: Create a new job (admin / super-admin / supervisor)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobInput"
      responses:
        "201":
          description: Job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get a single job by id
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
    patch:
      operationId: updateJob
      tags: [jobs]
      summary: Update a job (status, assignee, fields, progress)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobUpdate"
      responses:
        "200":
          description: Updated job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
    delete:
      operationId: deleteJob
      tags: [jobs]
      summary: Delete a job
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Deleted

  /users/{id}/resend-invite:
    post:
      operationId: resendInvite
      tags: [users]
      summary: Resend the invite email (and generate a new temp password)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Invite resent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateUserResult"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get stats and recent activity for the dashboard
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/supervisor:
    get:
      operationId: getDashboardSupervisor
      tags: [dashboard]
      summary: Get supervisor-specific dashboard data
      responses:
        "200":
          description: Supervisor dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupervisorDashboardData"
        "401":
          description: Not signed in

  /posts:
    get:
      operationId: getPosts
      tags: [posts]
      summary: Get all training/update posts
      responses:
        "200":
          description: List of posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"
    post:
      operationId: createPost
      tags: [posts]
      summary: Create a new post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInput"
      responses:
        "201":
          description: Created post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /notifications:
    get:
      operationId: getNotifications
      tags: [notifications]
      summary: Get current user notifications
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a notification as read
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }

  /time-logs:
    get:
      operationId: getTimeLogs
      tags: [time-logs]
      summary: Get all time logs for current user
      responses:
        "200":
          description: List of time logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimeLog"
    post:
      operationId: createTimeLog
      tags: [time-logs]
      summary: Create a new time log
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TimeLogInput"
      responses:
        "201":
          description: Created time log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeLog"

  /time-logs/{id}:
    delete:
      operationId: deleteTimeLog
      tags: [time-logs]
      summary: Delete a time log
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    ApiErrorBody:
      type: object
      required: [error]
      properties:
        error: { type: string }

    UserRole:
      type: string
      enum: [super-admin, admin, supervisor, user]

    UserStatus:
      type: string
      enum: [active, inactive]

    User:
      type: object
      required: [id, email, name, role, status, mustResetPassword, createdAt]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        name: { type: string }
        avatarUrl: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        bio: { type: ["string", "null"] }
        role: { $ref: "#/components/schemas/UserRole" }
        status: { $ref: "#/components/schemas/UserStatus" }
        mustResetPassword: { type: boolean }
        lastSignInAt:
          type: ["string", "null"]
          format: date-time
        createdAt: { type: string, format: date-time }

    UserInput:
      type: object
      required: [name, email, role, delivery]
      properties:
        name: { type: string, minLength: 1 }
        email: { type: string, format: email }
        phone: { type: string }
        bio: { type: string }
        role: { $ref: "#/components/schemas/UserRole" }
        delivery:
          type: string
          enum: [email-invite, temp-password]

    UserUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        email: { type: string, format: email }
        avatarUrl: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        bio: { type: ["string", "null"] }
        role: { $ref: "#/components/schemas/UserRole" }
        status: { $ref: "#/components/schemas/UserStatus" }

    UserSettings:
      type: object
      required: [userId, inAppNotifications, emailNotifications, pushNotifications, smsNotifications, zohoCliqNotifications, weeklyDigest, mentions, twoFactorEnabled, theme, accentColor, compactMode, language, timezone, dateFormat, currency]
      properties:
        userId: { type: string, format: uuid }
        inAppNotifications: { type: boolean }
        emailNotifications: { type: boolean }
        pushNotifications: { type: boolean }
        smsNotifications: { type: boolean }
        zohoCliqNotifications: { type: boolean }
        weeklyDigest: { type: boolean }
        mentions: { type: boolean }
        notificationFrequency: { type: string }
        quietHoursStart: { type: ["string", "null"] }
        quietHoursEnd: { type: ["string", "null"] }
        soundEnabled: { type: boolean }
        twoFactorEnabled: { type: boolean }
        theme: { type: string }
        accentColor: { type: string }
        compactMode: { type: boolean }
        language: { type: string }
        timezone: { type: string }
        dateFormat: { type: string }
        currency: { type: string }

    UserSettingsUpdate:
      type: object
      properties:
        inAppNotifications: { type: boolean }
        emailNotifications: { type: boolean }
        pushNotifications: { type: boolean }
        smsNotifications: { type: boolean }
        zohoCliqNotifications: { type: boolean }
        weeklyDigest: { type: boolean }
        mentions: { type: boolean }
        notificationFrequency: { type: string }
        quietHoursStart: { type: ["string", "null"] }
        quietHoursEnd: { type: ["string", "null"] }
        soundEnabled: { type: boolean }
        twoFactorEnabled: { type: boolean }
        theme: { type: string }
        accentColor: { type: string }
        compactMode: { type: boolean }
        language: { type: string }
        timezone: { type: string }
        dateFormat: { type: string }
        currency: { type: string }

    SystemSettings:
      type: object
      required: [id, autoBackup, maintenanceMode, apiLogging, notifRetentionDays, overdueEscalationDays, reminderSchedule]
      properties:
        id: { type: string }
        autoBackup: { type: boolean }
        maintenanceMode: { type: boolean }
        apiLogging: { type: boolean }
        notifRetentionDays: { type: integer }
        overdueEscalationDays: { type: integer }
        reminderSchedule: { type: string }

    SystemSettingsUpdate:
      type: object
      properties:
        autoBackup: { type: boolean }
        maintenanceMode: { type: boolean }
        apiLogging: { type: boolean }
        notifRetentionDays: { type: integer }
        overdueEscalationDays: { type: integer }
        reminderSchedule: { type: string }

    SystemMetrics:
      type: object
      required: [storageUsed, storageFiles, apiCallsToday, apiCallsTrend, activeUsers, totalUsers]
      properties:
        storageUsed: { type: string }
        storageFiles: { type: number }
        apiCallsToday: { type: number }
        apiCallsTrend: { type: string }
        activeUsers: { type: number }
        totalUsers: { type: number }

    CreateUserResult:
      type: object
      required: [user, delivery]
      properties:
        user: { $ref: "#/components/schemas/User" }
        delivery:
          type: string
          enum: [email-invite, temp-password]
        tempPassword:
          type: ["string", "null"]
          description: Returned only when delivery is "temp-password"
        emailSent:
          type: ["boolean", "null"]
          description: True when an invite email was successfully dispatched

    LoginInput:
      type: object
      required: [email, password, role]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 1 }
        role: { $ref: "#/components/schemas/UserRole" }

    LoginResult:
      type: object
      required: [user]
      properties:
        user: { $ref: "#/components/schemas/User" }

    ResetPasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword: { type: string, minLength: 1 }
        newPassword: { type: string, minLength: 8 }

    AssignableUser:
      type: object
      required: [id, name, role]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        role: { $ref: "#/components/schemas/UserRole" }

    JobStatus:
      type: string
      enum:
        [
          pending,
          in_progress,
          awaiting_supervisor,
          awaiting_admin,
          completed,
          cancelled,
          rework,
        ]

    JobPriority:
      type: string
      enum: [low, medium, high]

    JobUserRef:
      type: object
      required: [id, name, role]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        role: { $ref: "#/components/schemas/UserRole" }

    Job:
      type: object
      required:
        [
          id,
          number,
          title,
          client,
          status,
          priority,
          progress,
          isOverdue,
          createdAt,
          updatedAt,
        ]
      properties:
        id: { type: string, format: uuid }
        number: { type: string, description: "Display number e.g. JOB-1042" }
        title: { type: string }
        client: { type: string }
        address: { type: ["string", "null"] }
        description: { type: ["string", "null"] }
        status: { $ref: "#/components/schemas/JobStatus" }
        priority: { $ref: "#/components/schemas/JobPriority" }
        progress: { type: integer, minimum: 0, maximum: 100 }
        isOverdue: { type: boolean }
        assignee:
          oneOf:
            - $ref: "#/components/schemas/JobUserRef"
            - type: "null"
        assignees:
          type: array
          items:
            $ref: "#/components/schemas/JobUserRef"
          description: Workers explicitly selected in the Assignees field when the job was created or edited
        supervisor:
          oneOf:
            - $ref: "#/components/schemas/JobUserRef"
            - type: "null"
        dueDate:
          type: ["string", "null"]
          format: date-time
        reviewStartedAt:
          type: ["string", "null"]
          format: date-time
          description: When the job entered supervisor review (worker submitted for review)
        completedAt:
          type: ["string", "null"]
          format: date-time
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    JobInput:
      type: object
      required: [title, client]
      properties:
        title: { type: string, minLength: 1 }
        client: { type: string, minLength: 1 }
        address: { type: string }
        description: { type: string }
        priority: { $ref: "#/components/schemas/JobPriority" }
        assigneeId: { type: ["string", "null"], format: uuid }
        supervisorId: { type: ["string", "null"], format: uuid }
        dueDate: { type: ["string", "null"], format: date-time }

    JobUpdate:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        client: { type: string, minLength: 1 }
        address: { type: ["string", "null"] }
        description: { type: ["string", "null"] }
        priority: { $ref: "#/components/schemas/JobPriority" }
        status: { $ref: "#/components/schemas/JobStatus" }
        assigneeId: { type: ["string", "null"], format: uuid }
        supervisorId: { type: ["string", "null"], format: uuid }
        dueDate: { type: ["string", "null"], format: date-time }
        progress: { type: integer, minimum: 0, maximum: 100 }

    DashboardStats:
      type: object
      required: [stats, recentJobs]
      properties:
        stats:
          type: object
          required: [totalUsers, totalJobs, activeJobs, overdueJobs]
          properties:
            totalUsers: { type: integer }
            totalJobs: { type: integer }
            activeJobs: { type: integer }
            overdueJobs: { type: integer }
        recentJobs:
          type: array
          items: { $ref: "#/components/schemas/Job" }

    SupervisorDashboardData:
      type: object
      required: [stats, activeJobs, team, overdue]
      properties:
        stats:
          type: object
          required: [activeJobs, teamSize, totalJobs, overdueJobs]
          properties:
            activeJobs: { type: integer }
            teamSize: { type: integer }
            totalJobs: { type: integer }
            overdueJobs: { type: integer }
        activeJobs:
          type: array
          items: { $ref: "#/components/schemas/Job" }
        team:
          type: array
          items:
            type: object
            required: [name, avatar, jobsToday, hoursToday, status]
            properties:
              name: { type: string }
              avatar: { type: string }
              jobsToday: { type: integer }
              hoursToday: { type: number }
              status: { type: string, enum: [online, offline] }
        overdue:
          type: array
          items:
            type: object
            required: [id, title, days, assignee]
            properties:
              id: { type: string }
              title: { type: string }
              days: { type: integer }
              assignee: { type: string }

    Post:
      type: object
      required: [id, title, body, category, authorId, createdAt]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        body: { type: string }
        category: { type: string }
        authorId: { type: string, format: uuid }
        attachments: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }

    PostInput:
      type: object
      required: [title, body, category]
      properties:
        title: { type: string }
        body: { type: string }
        category: { type: string }

    Notification:
      type: object
      required: [id, userId, title, description, type, isRead, createdAt]
      properties:
        id: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        title: { type: string }
        description: { type: string }
        type: { type: string }
        isRead: { type: boolean }
        createdAt: { type: string, format: date-time }

    TimeLog:
      type: object
      required: [id, userId, task, duration, createdAt]
      properties:
        id: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        jobId: { type: ["string", "null"], format: uuid }
        task: { type: string }
        duration: { type: integer, description: "duration in seconds" }
        startTime: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }

    TimeLogInput:
      type: object
      required: [task, duration]
      properties:
        task: { type: string }
        duration: { type: integer }
        jobId: { type: ["string", "null"], format: uuid }
